services:
  toodue:
    build:
      context: .
      dockerfile: Dockerfile
    image: toodue:latest
    container_name: toodue
    restart: unless-stopped
    environment:
      DATA_DIR: /data
      STATIC_DIR: /srv/static
      PORT: "8080"
      DATABASE_URL: ${DATABASE_URL:-postgres://toodue:${POSTGRES_PASSWORD}@toodue-db:5432/toodue}
      RUST_LOG: ${RUST_LOG:-toodue=info,tower_http=info}
      PUBLIC_URL: ${PUBLIC_URL:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
    volumes:
      - toodue-data:/data
    ports:
      - "${BIND_ADDR:-127.0.0.1}:${TOODUE_PORT:-8527}:8080"
    depends_on:
      toodue-db:
        condition: service_healthy

  toodue-db:
    image: postgres:16-alpine
    container_name: toodue-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: toodue
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: toodue
    volumes:
      - toodue-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U toodue -d toodue"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  toodue-data:
  toodue-postgres:
